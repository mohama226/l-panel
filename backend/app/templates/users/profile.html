<div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:20px;">

    {% if user.enabled %}
    <button class="btn-warning" onclick="disableUser()">
        Disable
    </button>
    {% else %}
    <button class="btn-success" onclick="enableUser()">
        Enable
    </button>
    {% endif %}

    {% if user.blocked %}
    <button class="btn-success" onclick="unblockUser()">
        Unblock
    </button>
    {% else %}
    <button class="btn-warning" onclick="blockUser()">
        Block
    </button>
    {% endif %}

    {% if user.suspended %}
    <button class="btn-success" onclick="unsuspendUser()">
        Unsuspend
    </button>
    {% else %}
    <button class="btn-warning" onclick="suspendUser()">
        Suspend
    </button>
    {% endif %}

    <button class="btn-primary" onclick="changePassword()">
        Change Password
    </button>

    <button class="btn-primary" onclick="extendUser()">
        Extend Account
    </button>

    <button class="btn-primary" onclick="resetTraffic()">
        Reset Traffic
    </button>

    <button class="btn-danger" onclick="deleteUser()">
        Delete User
    </button>

</div>

<script>

async function enableUser(){

    const r=await fetch(`/users/${username}/enable`,{
        method:"POST"
    });

    alert((await r.json()).detail);
    location.reload();

}

async function disableUser(){

    const r=await fetch(`/users/${username}/disable`,{
        method:"POST"
    });

    alert((await r.json()).detail);
    location.reload();

}

async function blockUser(){

    const r=await fetch(`/users/${username}/block`,{
        method:"POST"
    });

    alert((await r.json()).detail);
    location.reload();

}

async function unblockUser(){

    const r=await fetch(`/users/${username}/unblock`,{
        method:"POST"
    });

    alert((await r.json()).detail);
    location.reload();

}

async function suspendUser(){

    const r=await fetch(`/users/${username}/suspend`,{
        method:"POST"
    });

    alert((await r.json()).detail);
    location.reload();

}

async function unsuspendUser(){

    const r=await fetch(`/users/${username}/unsuspend`,{
        method:"POST"
    });

    alert((await r.json()).detail);
    location.reload();

}

</script>
