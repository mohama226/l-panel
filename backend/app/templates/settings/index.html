{% extends "base.html" %}

{% block content %}

<div class="page-header">

    <h1>⚙ Panel Settings</h1>

</div>

<div class="card">

    <h2>Localization</h2>

    <form method="post">

        <div class="form-group">

            <label>Calendar Type</label>

            <select name="calendar">

                <option value="gregorian"
                    {% if settings.calendar=="gregorian" %}selected{% endif %}>
                    Gregorian
                </option>

                <option value="jalali"
                    {% if settings.calendar=="jalali" %}selected{% endif %}>
                    Jalali (Persian)
                </option>

            </select>

        </div>

        <div class="form-group">

            <label>Timezone</label>

            <select name="timezone">

                <option value="Asia/Tehran"
                    {% if settings.timezone=="Asia/Tehran" %}selected{% endif %}>
                    Asia / Tehran
                </option>

                <option value="UTC"
                    {% if settings.timezone=="UTC" %}selected{% endif %}>
                    UTC
                </option>

                <option value="Europe/London"
                    {% if settings.timezone=="Europe/London" %}selected{% endif %}>
                    Europe / London
                </option>

                <option value="Europe/Berlin"
                    {% if settings.timezone=="Europe/Berlin" %}selected{% endif %}>
                    Europe / Berlin
                </option>

                <option value="America/New_York"
                    {% if settings.timezone=="America/New_York" %}selected{% endif %}>
                    America / New York
                </option>

                <option value="America/Los_Angeles"
                    {% if settings.timezone=="America/Los_Angeles" %}selected{% endif %}>
                    America / Los Angeles
                </option>

                <option value="Asia/Dubai"
                    {% if settings.timezone=="Asia/Dubai" %}selected{% endif %}>
                    Asia / Dubai
                </option>

                <option value="Asia/Istanbul"
                    {% if settings.timezone=="Asia/Istanbul" %}selected{% endif %}>
                    Asia / Istanbul
                </option>

            </select>

        </div>

        <div class="form-group">

            <label>Time Format</label>

            <select name="time_format">

                <option value="24"
                    {% if settings.time_format=="24" %}selected{% endif %}>
                    24 Hour
                </option>

                <option value="12"
                    {% if settings.time_format=="12" %}selected{% endif %}>
                    12 Hour (AM/PM)
                </option>

            </select>

        </div>

        <br>

        <button class="btn btn-primary">

            Save Settings

        </button>

    </form>

</div>

{% endblock %}
