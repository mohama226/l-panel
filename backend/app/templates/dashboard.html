{% extends "base.html" %}

{% block content %}

<h1>Dashboard</h1>

<table style="font-size:20px">

<tr>
<td><b>CPU Usage</b></td>
<td>{{ cpu }} %</td>
</tr>

<tr>
<td><b>RAM Usage</b></td>
<td>{{ ram }} %</td>
</tr>

<tr>
<td><b>Disk Usage</b></td>
<td>{{ disk }} %</td>
</tr>

<tr>
<td><b>System Uptime</b></td>
<td>{{ uptime }}</td>
</tr>

<tr>
<td><b>OCServ Status</b></td>
<td>{{ ocserv }}</td>
</tr>

</table>

{% endblock %}
