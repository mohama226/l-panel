<header class="topbar">

    <div class="topbar-left">

        <span class="logo">

            {{ panel_name }}

        </span>

    </div>

    <div class="topbar-center">

        {{ server_time.strftime("%Y-%m-%d %H:%M:%S") }}

    </div>

    <div class="topbar-right">

        <span class="status online">

            🟢 Online

        </span>

        <span class="version">

            v{{ panel_version }}

        </span>

    </div>

</header>
