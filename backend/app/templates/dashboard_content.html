<div class="dashboard-grid">

    <div class="stat-card">
        <div class="stat-icon blue">
            <i class="fa-solid fa-users"></i>
        </div>

        <div class="stat-info">
            <div class="stat-value">{{ users }}</div>
            <div class="stat-title">Users</div>
        </div>
    </div>

    <div class="stat-card">
        <div class="stat-icon green">
            <i class="fa-solid fa-user-shield"></i>
        </div>

        <div class="stat-info">
            <div class="stat-value">{{ admins }}</div>
            <div class="stat-title">Admins</div>
        </div>
    </div>

    <div class="stat-card">
        <div class="stat-icon orange">
            <i class="fa-solid fa-server"></i>
        </div>

        <div class="stat-info">
            <div class="stat-value">{{ servers }}</div>
            <div class="stat-title">Servers</div>
        </div>
    </div>

    <div class="stat-card">
        <div class="stat-icon purple">
            <i class="fa-solid fa-circle"></i>
        </div>

        <div class="stat-info">
            <div class="stat-value">{{ online }}</div>
            <div class="stat-title">Online Users</div>
        </div>
    </div>

</div>


<div class="dashboard-grid">

    <div class="progress-card">

        <div class="progress-header">
            <span>CPU Usage</span>
            <span>{{ cpu }}%</span>
        </div>

        <div class="progress">
            <div class="progress-bar" style="width:{{ cpu }}%"></div>
        </div>

    </div>

    <div class="progress-card">

        <div class="progress-header">
            <span>RAM Usage</span>
            <span>{{ ram }}%</span>
        </div>

        <div class="progress">
            <div class="progress-bar green-bar" style="width:{{ ram }}%"></div>
        </div>

    </div>

    <div class="progress-card">

        <div class="progress-header">
            <span>Disk Usage</span>
            <span>{{ disk }}%</span>
        </div>

        <div class="progress">
            <div class="progress-bar orange-bar" style="width:{{ disk }}%"></div>
        </div>

    </div>

</div>


<div class="dashboard-grid">

    <div class="info-card">

        <i class="fa-solid fa-gauge-high"></i>

        <div>

            <strong>Load Average</strong>

            <p>{{ load }}</p>

        </div>

    </div>

    <div class="info-card">

        <i class="fa-solid fa-clock"></i>

        <div>

            <strong>Uptime</strong>

            <p>{{ uptime }}</p>

        </div>

    </div>

    <div class="info-card">

        <i class="fa-solid fa-upload"></i>

        <div>

            <strong>Upload</strong>

            <p>{{ traffic_up }} MB</p>

        </div>

    </div>

    <div class="info-card">

        <i class="fa-solid fa-download"></i>

        <div>

            <strong>Download</strong>

            <p>{{ traffic_down }} MB</p>

        </div>

    </div>

</div>
