<div class="dashboard-grid">

    <div class="stat-card">
        <div class="stat-icon blue">
            <i class="fa-solid fa-users"></i>
        </div>

        <div class="stat-info">
            <div class="stat-value" id="users-value">{{ users }}</div>
            <div class="stat-title">Users</div>
        </div>
    </div>

    <div class="stat-card">
        <div class="stat-icon green">
            <i class="fa-solid fa-user-shield"></i>
        </div>

        <div class="stat-info">
            <div class="stat-value" id="admins-value">{{ admins }}</div>
            <div class="stat-title">Admins</div>
        </div>
    </div>

    <div class="stat-card">
        <div class="stat-icon orange">
            <i class="fa-solid fa-server"></i>
        </div>

        <div class="stat-info">
            <div class="stat-value" id="servers-value">{{ servers }}</div>
            <div class="stat-title">Servers</div>
        </div>
    </div>

    <div class="stat-card">
        <div class="stat-icon purple">
            <i class="fa-solid fa-circle"></i>
        </div>

        <div class="stat-info">
            <div class="stat-value" id="online-value">{{ online }}</div>
            <div class="stat-title">Online Users</div>
        </div>
    </div>

</div>

<div class="dashboard-grid">

    <div class="progress-card">

        <div class="progress-header">
            <span>CPU Usage</span>
            <span id="cpu-text">{{ cpu }}%</span>
        </div>

        <div class="progress">
            <div class="progress-bar" id="cpu-bar" style="width:{{ cpu }}%"></div>
        </div>

    </div>

    <div class="progress-card">

        <div class="progress-header">
            <span>RAM Usage</span>
            <span id="ram-text">{{ ram }}%</span>
        </div>

        <div class="progress">
            <div class="progress-bar green-bar" id="ram-bar" style="width:{{ ram }}%"></div>
        </div>

    </div>

    <div class="progress-card">

        <div class="progress-header">
            <span>Disk Usage</span>
            <span id="disk-text">{{ disk }}%</span>
        </div>

        <div class="progress">
            <div class="progress-bar orange-bar" id="disk-bar" style="width:{{ disk }}%"></div>
        </div>

    </div>

</div>

<div class="dashboard-grid">

    <div class="info-card">
        <i class="fa-solid fa-gauge-high"></i>
        <div>
            <strong>Load Average</strong>
            <p id="load-value">{{ load }}</p>
        </div>
    </div>

    <div class="info-card">
        <i class="fa-solid fa-clock"></i>
        <div>
            <strong>Uptime</strong>
            <p id="uptime-value">{{ uptime }}</p>
        </div>
    </div>

    <div class="info-card">
        <i class="fa-solid fa-upload"></i>
        <div>
            <strong>Upload</strong>
            <p id="upload-value">{{ traffic_up }} MB</p>
        </div>
    </div>

    <div class="info-card">
        <i class="fa-solid fa-download"></i>
        <div>
            <strong>Download</strong>
            <p id="download-value">{{ traffic_down }} MB</p>
        </div>
    </div>

</div>
