<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %} - L-Panel</title>

    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="/static/adminlte/bootstrap.min.css">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="/static/adminlte/fontawesome.min.css">

    <!-- AdminLTE 4 Dark -->
    <link rel="stylesheet" href="/static/adminlte/adminlte.dark.min.css">

    <!-- Custom -->
    <link rel="stylesheet" href="/static/css/custom.css">
</head>

<body class="layout-fixed sidebar-mini dark-mode">

<div class="wrapper">

    {% include "layout/navbar.html" %}
    {% include "layout/sidebar.html" %}

    <div class="content-wrapper p-3">

        {% block content %}
        {% endblock %}

    </div>

    {% include "layout/footer.html" %}

</div>

<!-- Scripts -->
<script src="/static/adminlte/bootstrap.bundle.min.js"></script>
<script src="/static/adminlte/adminlte.min.js"></script>

</body>
</html>
