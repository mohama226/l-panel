<!DOCTYPE html>

<html>

<head>

<title>
{% block title %}
L-Panel
{% endblock %}
</title>


<meta charset="utf-8">


<style>


body{

font-family:
Arial,
sans-serif;

background:#f5f7fb;

margin:0;

}



.sidebar{

width:220px;

height:100vh;

background:#111827;

color:white;

position:fixed;

left:0;

top:0;

padding:20px;

}



.sidebar a{

display:block;

color:white;

padding:12px;

text-decoration:none;

}



.sidebar a:hover{

background:#2563eb;

}



.content{

margin-left:260px;

padding:30px;

}



.card{

background:white;

padding:25px;

border-radius:12px;

box-shadow:
0 5px 20px
rgba(0,0,0,.08);

}



table{

width:100%;

border-collapse:collapse;

}


th,td{

padding:12px;

border-bottom:1px solid #ddd;

text-align:left;

}



button{

background:#2563eb;

color:white;

border:0;

padding:10px 18px;

border-radius:8px;

cursor:pointer;

}



.online{

color:green;

font-weight:bold;

}



.badge{

color:red;

font-weight:bold;

}



</style>


</head>



<body>


<div class="sidebar">


<h2>
L-Panel
</h2>


<a href="/">
Dashboard
</a>


<a href="/users/">
Users
</a>



<a href="/servers/">
Servers
</a>



<a href="/sessions/">
Sessions
</a>



</div>



<div class="content">


{% block content %}

{% endblock %}



</div>



</body>


</html>
