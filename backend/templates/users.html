<!doctype html>

<html>

<head>

<meta charset="utf-8">

<title>Users</title>

<style>

body{

font-family:Arial;

margin:30px;

background:#f5f5f5;

}

table{

width:100%;

background:white;

border-collapse:collapse;

}

td,th{

padding:12px;

border:1px solid #ddd;

}

th{

background:#1f2937;

color:white;

}

.search{

margin-bottom:20px;

}

input{

padding:10px;

width:350px;

}

</style>

</head>

<body>

<h2>Users</h2>

<div class="search">

<input
id="search"
placeholder="Search User..."
>

</div>

<table id="table">

<tr>

<th>#</th>

<th>Username</th>

<th>Expire</th>

<th>Status</th>

<th>Server</th>

</tr>

{% for u in users %}

<tr>

<td>{{u.id}}</td>

<td>{{u.username}}</td>

<td>{{u.expire_date}}</td>

<td>{{u.status}}</td>

<td>

{% if u.server %}

{{u.server.name}}

{% endif %}

</td>

</tr>

{% endfor %}

</table>

<script>

let input=document.getElementById("search");

input.onkeyup=function(){

let filter=input.value.toLowerCase();

let rows=document.querySelectorAll("#table tr");

rows.forEach((r,i)=>{

if(i==0)return;

let txt=r.innerText.toLowerCase();

r.style.display=txt.includes(filter)?"":"none";

});

}

</script>

</body>

</html>
